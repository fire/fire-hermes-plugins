name: Documentation

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.md'
      - 'examples/**'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.4.x"
    
    - name: Install dependencies
      run: |
        uv sync --all-extras
    
    - name: Check example scripts
      run: |
        echo "Validating all example scripts..."
        for script in examples/**/*.py; do
          if [ -f "$script" ]; then
            echo "Checking: $script"
            uv run python -m py_compile "$script"
          fi
        done
        echo "✓ All examples compile successfully"
    
    - name: Validate README links
      run: |
        echo "Checking README.md..."
        test -f README.md && echo "✓ README.md exists"
        test -f examples/entity_capabilities/README.md && echo "✓ Entity-capabilities README exists"
